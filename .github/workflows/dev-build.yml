name: Dev Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - ".github/**"
      - "gradle.properties"
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Get date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create dev release
        uses: ncipollo/release-action@v1
        with:
          tag: "dev-${{ steps.date.outputs.date }}-${{ steps.sha.outputs.short }}"
          name: "Dev ${{ steps.date.outputs.date }} (${{ steps.sha.outputs.short }})"
          prerelease: true
          artifacts: "versions/*/build/libs/!(*-sources).jar"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prune old dev releases (keep 5)
        run: |
          gh release list --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease) | .tagName' | \
            grep "^dev-" | \
            tail -n +6 | \
            xargs -I {} sh -c 'gh release delete {} --yes --cleanup-tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}